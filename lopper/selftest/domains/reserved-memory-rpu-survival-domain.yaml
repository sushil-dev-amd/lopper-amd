# RPU domain for reserved-memory survival rule testing
# Target: /domains/RPU_domain
#
# Expected results after domain_access filtering:
#   memory_r5@0         SURVIVES  (openamp,domain-memory-v1, unconditional)
#   rpu0vdev0vring0     SURVIVES  (openamp,xlnx,mem-carveout, claimed via reserved-memory)
#   rpu0vdev0vring1     SURVIVES  (openamp,xlnx,mem-carveout, claimed via reserved-memory)
#   unclaimed_rpu@3ee0  PRUNED    (openamp,xlnx,mem-carveout, not claimed by this domain)
#   no_ref_region@3ef0  SURVIVES  (lopper,no-ref-required)
#   cma_pool@10000000   PRUNED    (shared-dma-pool, ethernet not in RPU domain access)
#   unused_cma@20000000 PRUNED    (shared-dma-pool, no ref)

compatible: openamp,domain-v1

domains:
  RPU_domain:
    compatible: access-domain,domain-v1

    memory:
      - start: 0x0
        size: 0x8000000

    # Explicitly claim vring0 and vring1 -- unclaimed_rpu is deliberately omitted
    reserved-memory:
      - rpu0vdev0vring0@3ed00000
      - rpu0vdev0vring1@3ed04000

    cpus:
      - cluster: cpus_r5
        cpumask: 0x1
        mode:
          secure: false
